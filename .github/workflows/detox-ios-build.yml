name: Detox iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS (sim release)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm i

      # - name: detox Install
      #   run: npm install detox-cli --global
      - name: install maestro
        run: brew tap mobile-dev-inc/tap && brew install mobile-dev-inc/tap/maestro

      - name: env Setup
        run: brew tap wix/brew && brew install applesimutils

      - name: Expo prebuild
        run: npx expo prebuild

      - name: Detox build
        run: npx detox build -c ios.sim.release

      - name: Select and boot simulator
        # This script finds an available iPhone 15 simulator and boots it
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep 'iPhone 17' | head -n 1 | awk '{print $NF}' | tr -d '()')
          xcrun simctl boot $SIM_ID
          xcrun simctl install $SIM_ID $PWD/build/Wikipedia.app # Install your app
          echo "DEVICE_ID=$SIM_ID" >> $GITHUB_ENV # Set the device ID as an environment variable

      - name: Run Maestro UI tests
        run: |
          maestro --device $DEVICE_ID test .maestro/test1.yml

      - name: Upload test artifacts (screenshots, recordings)
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports
          path: .maestro/

      # - name: detox test
      #   run: npx detox test -c ios.sim.release

