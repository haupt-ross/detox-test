name: Detox iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ios:
    name: Build and Test iOS (sim release)
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: npm

      - name: Install dependencies
        run: npm i

      # - name: detox Install
      #   run: npm install detox-cli --global

      # - name: env Setup
      #   run: brew tap wix/brew && brew install applesimutils

      - name: Expo prebuild
        run: npx expo prebuild

      - name: Detox build ios
        run: npx detox build -c ios.sim.release

      - name: Detox test ios
        run: npx detox test -c ios.sim.release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-ios
          path: artifacts

  android:
    name: Build and Test Android (emu release)
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: npm

      - name: Install dependencies
        run: npm i

      # - name: detox Install
      #   run: npm install detox-cli --global

      - name: Expo prebuild
        run: npx expo prebuild

      - name: Detox build android
        run: npx detox build -c android.emu.release

      - name: Detox test android
        run: npx detox test -c android.emu.release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android
          path: artifacts
